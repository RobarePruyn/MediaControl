# SuiteCommand — Nginx reverse proxy configuration
# Handles TLS termination, service routing, and static file serving

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20m;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Upstream definitions
    upstream api_server {
        server api-server:4000;
    }

    upstream admin_ui {
        server admin-ui:80;
    }

    upstream control_ui {
        server control-ui:80;
    }

    # -------------------------------------------------------------------------
    # HTTP — Redirect all traffic to HTTPS
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # Health check endpoint (available over HTTP for Docker health checks)
        location /health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------------------------------------------------------
    # HTTPS — Main server block
    # -------------------------------------------------------------------------
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        # TLS certificate paths (mounted via Docker volume)
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # TLS hardening (per spec Section 13A)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # -----------------------------------------------------------------
        # API routes — proxy to api-server
        # -----------------------------------------------------------------
        location /api/ {
            proxy_pass http://api_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for long-running bridge operations (discovery, etc.)
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # -----------------------------------------------------------------
        # WebSocket routes — proxy to api-server with upgrade
        # -----------------------------------------------------------------
        location /ws/ {
            proxy_pass http://api_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket connections can be long-lived
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # -----------------------------------------------------------------
        # QR code static files — served directly by nginx
        # -----------------------------------------------------------------
        location /qr/ {
            alias /app/qr-storage/;
            expires 1h;
            add_header Cache-Control "public";

            # Only serve image files
            location ~* \.(png|svg|jpg|jpeg)$ {
                try_files $uri =404;
            }
        }

        # -----------------------------------------------------------------
        # Admin UI — proxy to admin-ui container
        # -----------------------------------------------------------------
        location /admin/ {
            proxy_pass http://admin_ui/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # -----------------------------------------------------------------
        # Control UI — explicit /control/ path
        # -----------------------------------------------------------------
        location /control/ {
            proxy_pass http://control_ui/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # -----------------------------------------------------------------
        # Default — control UI (guest-facing landing page)
        # -----------------------------------------------------------------
        location / {
            proxy_pass http://control_ui;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
